<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — KSAN</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body { background: var(--light); }
  
  .auth-wrapper {
    min-height: calc(100vh - 64px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }

  .auth-card {
    background: white;
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.04);
  }

  .auth-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
  }

  .auth-logo-box {
    width: 48px; height: 48px;
    background: var(--orange);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }

  .auth-logo-box span {
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
  }

  .auth-card h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .auth-card .subtitle {
    text-align: center;
    color: var(--gray);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: var(--gray);
    font-size: 12px;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .social-btn {
    width: 100%;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: white;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
    transition: border 0.2s;
    font-family: inherit;
  }

  .social-btn:hover { border-color: var(--black); }

  .auth-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: var(--gray);
  }

  .auth-footer a { color: var(--orange); font-weight: 500; }
  .auth-footer a:hover { text-decoration: underline; }

  .demo-notice {
    background: var(--orange-pale);
    border: 1px solid var(--orange);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--orange-dark);
    line-height: 1.5;
  }

  .demo-notice strong { display: block; margin-bottom: 4px; }

  .quick-login {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 16px;
  }

  .quick-btn {
    padding: 8px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: white;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .quick-btn:hover {
    border-color: var(--orange);
    color: var(--orange);
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    font-size: 13px;
  }

  .checkbox-row label {
    display: flex; align-items: center; gap: 6px;
    color: var(--gray);
    cursor: pointer;
  }

  .forgot-link { color: var(--orange); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-box"><span>K</span></div>
    <span class="nav-logo-text">네덜란드 한국 학생회</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">홈</a></li>
    <li><a href="guide.html">정착 가이드</a></li>
    <li><a href="business.html">Business Hub</a></li>
    <li><a href="community.html">Community</a></li>
    <li><a href="events.html">이벤트</a></li>
  </ul>
  <div class="nav-actions"></div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-box"><span>K</span></div>
    </div>
    <h1>로그인</h1>
    <p class="subtitle">KSAN에 오신 것을 환영합니다</p>

    <div class="demo-notice">
      <strong>🎯 데모 모드 안내</strong>
      아래 "빠른 체험"에서 등급별 계정으로 바로 로그인 해보세요.
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>이메일</label>
        <input type="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" placeholder="••••••••" required>
      </div>

      <div class="checkbox-row">
        <label>
          <input type="checkbox"> 로그인 유지
        </label>
        <a href="#" class="forgot-link">비밀번호 찾기</a>
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-full">로그인</button>
    </form>

    <div class="divider">또는</div>

    <button class="social-btn">
      <span>🔵</span> Google 계정으로 로그인
    </button>
    <button class="social-btn">
      <span>💬</span> 카카오 계정으로 로그인
    </button>

    <div style="margin-top: 24px;">
      <p style="font-size: 12px; color: var(--gray); margin-bottom: 8px;">빠른 체험 (데모용)</p>
      <div class="quick-login">
        <button class="quick-btn" onclick="simulateLogin('student', '김학생')">Student 회원</button>
        <button class="quick-btn" onclick="simulateLogin('alumni', '박졸업')">Alumni</button>
        <button class="quick-btn" onclick="simulateLogin('admin', '정채연')">관리자</button>
      </div>
    </div>

    <div class="auth-footer">
      아직 계정이 없으신가요? <a href="signup.html">회원가입</a>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  function handleLogin(e) {
    e.preventDefault();
    // 기본 로그인은 Guest로
    simulateLogin('student', '김학생');
  }
</script>
</body>
</html>
